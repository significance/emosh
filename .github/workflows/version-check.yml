name: Version Check

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

jobs:
  verify-tag:
    name: Verify tag matches Cargo.toml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches Cargo.toml version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::tag says '$TAG_VERSION' but Cargo.toml says '$CARGO_VERSION' — that mass confusion will cost you Ξ0.42 in mass debugging"
            exit 1
          fi
          echo "tag '$TAG_VERSION' matches Cargo.toml '$CARGO_VERSION' — mass release vibes unlocked, mass Ξ saved"
